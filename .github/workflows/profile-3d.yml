name: GitHub-Profile-3D-Contrib

on:
  schedule: # 03:00 JST == 18:00 UTC
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    permissions:
      contents: write 

    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          # CHANGE: Use your custom PAT here to see private repos
          GITHUB_TOKEN: ${{ secrets.TOKEN }} 
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & Push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          # Save freshly generated SVGs
          cp -r profile-3d-contrib /tmp/profile-3d-contrib-new

          # Fetch and force local main branch to exactly match remote
          git fetch origin main
          git checkout -B main origin/main

          # Restore new SVGs on top of the clean remote tip
          cp -r /tmp/profile-3d-contrib-new/. profile-3d-contrib/

          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "Generate 3D Contribution Graph"
            git push origin main
          else
            echo "No changes to commit"
          fi
